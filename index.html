<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Happy Women's Day💖</title>
<style>
  body {
    margin: 0;
    height: 100vh;
    background: linear-gradient(180deg, #ffe6f2, #fff0f8, #ffffff);
    overflow: hidden;
    font-family: 'Segoe UI', sans-serif;
  }

  .center-text {
    pos40; // tỷ lệ co giãn, tự động theo màn hình
    const x = W / 2 + pos.x * scale;
    const y = H / 2 + pos.y * scale;

    const size = Math.random() * 3 + 1;
    const color = `rgba(255, 105, 180, ${Math.random() * 0.6 + 0.4})`;
    particles.push({ x, y, size, color, life: 1 });
  }

  function draw() {
    ctx.clearRect(0, 0, W, H);
    for (let i = 0; i < particles.length; i++) {
      const p = particles[i];
      ctx.beginPath();
      ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
      ctx.fillStyle = p.color;
      ctx.fill();
      p.life -= 0.01;
      p.size *= 0.98;
    }
    for (let i = particles.length - 1; i >= 0; i--) {
      if (particles[i].life <= 0) particles.splice(i, 1);
    }
  }

  function loop() {
    for (let i = 0; i < 50; i++) spawnParticle();
    draw();
    requestAnimationFrame(loop);
  }
  loop();

  // 🌸 Hoa rơi
  const petals = ["🌸", "🌷", "💗", "🌺"];
  function createPetal() {
    const petal = document.createElement('div');
    petal.className = 'petal';
    petal.textContent = petals[Math.floor(Math.random() * petals.length)];
    petal.style.left = Math.random() * 100 + 'vw';
    petal.style.animationDuration = (6 + Math.random() * 5) + 's';
    petal.style.fontSize = (16 + Math.random() * 12) + 'px';
    document.body.appendChild(petal);
    setTimeout(() => petal.remove(), 10000);
  }
  setInterval(createPetal, 600);

  // 💕 Chữ rơi
  const messages = ["20/10 vui vẻ nha 💗", "Chúc bạn xinh đẹp & hạnh phúc 🌸"];
  function createFallingText() {
    const text = document.createElement('div');
    text.className = 'falling-text';
    text.textContent = messages[Math.floor(Math.random() * messages.length)];
    text.style.left = Math.random() * 80 + 10 + '%';
    text.style.animationDuration = (4 + Math.random() * 3) + 's';
    document.body.appendChild(text);
    setTimeout(() => text.remove(), 6000);
  }
  setInterval(createFallingText, 1200);

  // 📱 Cập nhật lại khi đổi kích thước
  window.addEventListener('resize', () => {
    W = window.innerWidth; 
    H = window.innerHeight;
    canvas.width = W; 
    canvas.height = H;
  });
</script>

</body>
</html>
